name: BearGrub AI CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  beargrub-ai:
    name: Unit tests and offline prompt eval
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/beargrub-ai

    env:
      BEARGRUB_AUTO_INIT: "0"
      BEARGRUB_TEST_MODE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/beargrub-ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q app.py classifier.py config.py mcp_tools.py menu_answers.py prompts.py rag.py refresh.py scraper.py storage.py tests

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Run offline prompt eval
        run: python tests/offline_prompt_eval.py

      - name: Guard against committed generated or secret files
        working-directory: .
        run: |
          set -euo pipefail
          blocked="$(git ls-files | grep -E '(^|/)(\.env|__pycache__/|.*\.pyc$|chroma_db/)' || true)"
          if [ -n "$blocked" ]; then
            echo "Generated or secret-like files are tracked and must be removed:"
            echo "$blocked"
            exit 1
          fi
